[server]
port = 8300
host = "127.0.0.1"
data_dir = "./data"
# LAN UI origins: set explicitly in config.local.toml, e.g.
# allowed_origins_extra = ["http://192.168.1.113:8300"]

# Add agents here. Each gets a status pill, @mention routing, and color.
# "cwd" is the working directory for the agent's terminal session.
# "command" is the CLI command (must be on PATH).

[agents.claude]
command = "claude"
cwd = ".."
color = "#da7756"
label = "Claude"

[agents.codex]
command = "codex"
cwd = "C:/tools/agentchattr-scratch"
color = "#10a37f"
label = "Codex"
# codex 0.140's TUI ignores injected keystrokes on Windows (text enters but
# Enter never submits). Run headless via `codex exec` per @mention instead.
# Codex Reviewer operates as text-relay: sealed context in, text verdict out.
# No safe non-bypass codex exec MCP runtime path is currently proven for this
# project. Native MCP config keys are still emitted for future compatibility.
run_mode = "exec"

[agents.codex_coordinator]
command = "codex"
cwd = "C:/tools/agentchattr-scratch"
color = "#0e8c6f"
label = "Codex Coordinator"
# Workflow Coordinator identity (Codex #1). Same headless exec behaviour as the
# base "codex" provider; MCP/default behaviour is inherited via command-based
# resolution in wrapper._resolve_mcp_inject (command = "codex"). Must remain a
# SEPARATE identity from codex_reviewer — the session engine anti-self-review
# guard refuses to cast one identity as both coordinator and reviewer.
run_mode = "exec"

[agents.codex_reviewer]
command = "codex"
cwd = "C:/tools/agentchattr-scratch"
color = "#13c08a"
label = "Codex Reviewer"
# Independent Reviewer identity (Codex #2). Same headless exec behaviour as the
# base "codex" provider; MCP/default behaviour inherited via command-based
# resolution. Must remain a SEPARATE identity from codex_coordinator.
run_mode = "exec"

[agents.codexsafe]
command = "codex"
cwd = "C:/tools/agentchattr-scratch"
color = "#00b894"
label = "Codex safety"
run_mode = "exec"

[agents.gemini]
command = "gemini"
cwd = ".."
color = "#4285f4"
label = "Gemini"

[agents.kimi]
command = "kimi"
cwd = ".."
color = "#1783ff"
label = "Kimi"

[agents.qwen]
command = "qwen"
cwd = ".."
color = "#8b5cf6"
label = "Qwen"
mcp_inject = "settings_file"
mcp_settings_path = ".qwen/settings.json"
mcp_transport = "http"
inject_delay = 1.0

[agents.kilo]
command = "kilo"
cwd = ".."
color = "#f7f677"
label = "Kilo"

[agents.codebuddy]
command = "codebuddy"
cwd = ".."
color = "#6C4DFF"
label = "CodeBuddy"
mcp_inject = "settings_file"
mcp_settings_path = "~/.codebuddy/.mcp.json"
mcp_transport = "http"
mcp_http_key = "url"

[agents.copilot]
command = "copilot"
cwd = ".."
color = "#8534F3"
label = "Copilot"
mcp_inject = "settings_file"
mcp_settings_path = "~/.copilot/mcp-config.json"
mcp_transport = "http"
mcp_http_key = "url"
enter_backend = "wm_setfocus"

[agents.minimax]
type = "api"
base_url = "https://api.minimax.io/v1"
model = "MiniMax-M2.7"
color = "#2fe898"
label = "MiniMax"
api_key_env = "MINIMAX_API_KEY"
temperature = 1.0

[routing]
# "none" = only route on explicit @mention. "all" = route to all agents by default.
default = "none"
max_agent_hops = 4

# Daily roster — the SINGLE SOURCE OF TRUTH for role-to-agent resolution.
# ROLE > AGENT IDENTITY: workflow authority is bound to the role, not the model.
# External workflow roles are fixed: developer=claude, reviewer=codex, ui_lead=agy.
# Internal runtime roles below map to existing internal agentchattr identities and
# are NOT external workflow personas. safety_guard maps ONLY to codexsafe (a
# boundary guard / safety mechanism, never a workflow persona).
[roster]
developer = "claude"
reviewer = "codex"
ui_lead = "agy"
runtime_coordinator = "codex_coordinator"
runtime_reviewer = "codex_reviewer"
safety_guard = "codexsafe"

[mcp]
http_port = 8200
sse_port = 8201

[images]
upload_dir = "./uploads"
max_size_mb = 10

# Sandbox flow start API (V2-B). Default OFF — enable in config.local.toml only.
# flow_start_require_loopback must remain true when flow_start_enabled is true;
# startup fails closed if a local override attempts to disable loopback.
# flow_start_channel_prefix is fixed/reserved as "sandbox-flow" in V2-B (not configurable).
[sandbox]
flow_start_enabled = false
flow_start_require_loopback = true
flow_start_template_allowlist = ["sandbox-bakery-flow"]
flow_start_channel_prefix = "sandbox-flow"
flow_start_max_active = 1
flow_start_rate_limit_per_minute = 3
flow_start_output_root = "C:\\Users\\Narachat\\OneDrive\\Ai-Report\\claude"

# --- MCP injection modes ---
# By default, claude/codex/gemini/kimi use built-in MCP config injection.
# For other CLI agents, set mcp_inject to tell the wrapper how to inject auth:
#
# mcp_inject modes:
#   "settings_file" — write a JSON settings file at mcp_settings_path (merges, not overwrites)
#   "env"           — write a settings file, expose path via mcp_env_var
#   "flag"          — write a config file, pass via CLI flag (mcp_flag, default: --mcp-config)
#   "proxy_flag"    — start a local proxy, pass URL via CLI flag template
#
# Example: Qwen Code CLI
#   [agents.qwen]
#   command = "qwen"
#   cwd = ".."
#   color = "#8b5cf6"
#   label = "Qwen"
#   mcp_inject = "settings_file"
#   mcp_settings_path = ".qwen/settings.json"
#   mcp_transport = "http"
#
# Example: CLI with env var for settings
#   [agents.mycli]
#   command = "mycli"
#   mcp_inject = "env"
#   mcp_env_var = "MYCLI_MCP_SETTINGS"
#   mcp_transport = "http"

# --- API agents (local models) ---
# Add local model agents in config.local.toml (gitignored).
# Example config.local.toml:
#
#   [agents.qwen]
#   type = "api"
#   base_url = "http://localhost:8189/v1"
#   model = "qwen3-4b"
#   color = "#8b5cf6"
#   label = "Qwen"
#   # api_key_env = "MY_API_KEY"     # optional: env var name for API key
#   # system_prompt = "You are ..."   # optional: custom system prompt
#
# Then run: python wrapper_api.py qwen


[agents.agy]
name = "agy"
tag = "@agy"
description = "Antigravity CLI UI/UX review agent"
command = "agy"
cwd = "C:/tools/agentchattr-scratch"
color = "#ffcc00"
label = "Agy"
system_prompt = "You are agy, a UI/UX reviewer for agentchattr. Focus on visual, responsive, accessibility, and interaction review. Do not edit files, run shell commands, call Slack MCP, request Target:*, or spawn subagents."
exec_prompt_suffix = """
AGY reviewer mode:
- Focus on UI/UX, responsive layout, accessibility, interaction, and visual quality review.
- Do not edit files, run shell commands, or run git commands.
- Do not use Slack MCP, request Target:*, persist permissions, or spawn subagents.
- Do not coordinate workflow, approve commits, approve merges, or act as a safety gate.
- Return concise findings and actionable notes only.
"""
# AGY 1.0.10 --print emits zero stdout; extract reply from brain transcript.
run_mode = "store_exec"
print_timeout = 120

# Server-approved workspace profiles (Phase 2 — validation/metadata only).
# UI/API cannot submit arbitrary workspace roots; profiles are the authority source.
[workspace_profiles.agentchattr-scratch]
workspace_root = "C:/tools/agentchattr-scratch"
allowed_modes = ["scratch-readonly", "read-only"]
default_mode = "scratch-readonly"
max_mode = "read-only"
default_forbidden_paths = [".git/**"]

[workspace_profiles.twinpet-pos]
workspace_root = "C:/Users/Narachat/twinpet-pos"
allowed_modes = ["read-only"]
default_mode = "read-only"
max_mode = "read-only"
require_git_repo = true
default_forbidden_paths = [".git/**"]

