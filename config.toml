# Phase 3B runtime enforcement (default OFF — metadata verification scaffolding only).
# read_only_external_cwd_enabled routes verified read-only session turns to approved
# external profile roots (e.g. twinpet-pos). Does not enable writes or docs-only.
# scoped_write_external_cwd_enabled routes verified implementation/scoped-write turns
# to approved external roots with write_files allowlist enforcement.
[workspace_policy]
runtime_enforcement_enabled = false
read_only_external_cwd_enabled = true
scoped_write_external_cwd_enabled = true

# Report-orchestrated coordinator flow (Prompt Memo / read-only analysis).
[report_orchestration]
max_report_prompt_chars = 120000
on_demand_snapshots_enabled = true
max_initial_report_flow_prompt_chars = 50000
max_snapshot_request_paths = 3
max_snapshot_response_chars = 60000
max_snapshot_rounds_per_worker = 4
max_total_snapshot_chars_per_worker = 120000
max_single_file_snapshot_chars = 45000

# Claude --print worker timeouts for session / Prompt Memo turns.
[session_worker_timeouts]
default_secs = 120
prompt_memo_secs = 600
docs_only_secs = 600
implementation_secs = 900
snapshot_max_chars_per_file = 48000

